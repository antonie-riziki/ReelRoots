{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Recover your account · ReelRoots</title>
    <link rel="stylesheet" href="{% static 'css/reelroots.css' %}">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-[#f5f7f4] text-[#10231c]">
    <main class="mx-auto flex min-h-screen max-w-md items-center px-5 py-10">
        <section class="w-full rounded-3xl border border-[#dce5df] bg-white p-7 shadow-xl">
            <a href="{% url 'auth' %}" class="text-sm font-bold text-[#176447]">← Back to sign in</a>
            <h1 class="mt-6 text-3xl font-extrabold tracking-tight">Recover your account</h1>
            <p class="mt-3 text-sm leading-6 text-slate-600">Enter your email and Supabase will send a secure password reset link.</p>
            <form method="post" class="mt-7 space-y-4">
                {% csrf_token %}
                <label for="email" class="block text-sm font-bold">Email address</label>
                <input id="email" name="email" type="email" required class="w-full rounded-2xl border border-[#dce5df] px-4 py-3 focus:border-[#176447] focus:outline-none">
                <button class="w-full rounded-2xl bg-[#176447] px-4 py-4 font-bold text-white">Send reset link</button>
            </form>
        </section>
    </main>
</body>
</html>
