<!DOCTYPE html>

<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>History Reels Feed - ReelRoots</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- Google Fonts: Plus Jakarta Sans -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <!-- Material Symbols -->
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1111d4",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101022",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .video-gradient {
            background: linear-gradient(to top, rgba(0, 0, 0, 0.8) 0%, rgba(0, 0, 0, 0.4) 30%, rgba(0, 0, 0, 0) 100%);
        }

        .glass-nav {
            backdrop-filter: blur(12px);
            background-color: rgba(255, 255, 255, 0.85);
        }

        .safe-area-bottom {
            padding-bottom: env(safe-area-inset-bottom);
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 antialiased overflow-hidden">
    <!-- Mobile Container (Simulating iOS Phone Frame) -->
    <div class="relative mx-auto h-screen max-w-[430px] bg-black flex flex-col shadow-2xl overflow-hidden">
        <!-- Header Overlay -->
        <div class="absolute top-0 left-0 right-0 z-20 flex items-center justify-between p-6 pt-12">
            <h1 class="text-white text-xl font-extrabold tracking-tight">ReelRoots</h1>
            <div class="flex gap-4">
                <button class="text-white bg-black/20 p-2 rounded-full backdrop-blur-md">
                    <span class="material-symbols-outlined">search</span>
                </button>
                <button class="text-white bg-black/20 p-2 rounded-full backdrop-blur-md">
                    <span class="material-symbols-outlined">more_horiz</span>
                </button>
            </div>
        </div>

        <!-- Scroll Container -->
        <div class="h-screen overflow-y-scroll snap-y snap-mandatory">

            {% for reel in reels %}

            <!-- Each Reel = Full Screen -->
            <div class="relative h-screen w-full snap-start bg-slate-900 flex items-center justify-center">

                <iframe
                    class="absolute inset-0 w-full h-full"
                    src="{{ reel.video_url }}"
                    frameborder="0"
                    allow="autoplay; encrypted-media"
                    allowfullscreen>
                </iframe>

                <!-- Video -->
                <!-- <video autoplay muted loop playsinline
                    class="absolute inset-0 w-full h-full object-cover">
                    <source src="{{ reel.video_url }}" type="video/mp4">
                </video> -->

                <!-- Right Sidebar -->
                <div class="absolute right-4 bottom-32 z-10 flex flex-col items-center gap-6">

                    <button class="flex flex-col items-center gap-1">
                        <div class="bg-black/20 backdrop-blur-md p-3 rounded-full text-white">
                            <span class="material-symbols-outlined text-3xl">favorite</span>
                        </div>
                        <span class="text-white text-xs font-bold drop-shadow-md">
                            {{ reel.likes }}
                        </span>
                    </button>

                    <button class="flex flex-col items-center gap-1">
                        <div class="bg-black/20 backdrop-blur-md p-3 rounded-full text-white">
                            <span class="material-symbols-outlined text-3xl">chat_bubble</span>
                        </div>
                        <span class="text-white text-xs font-bold drop-shadow-md">
                            {{ reel.comments }}
                        </span>
                    </button>

                    <button class="flex flex-col items-center gap-1">
                        <div class="bg-black/20 backdrop-blur-md p-3 rounded-full text-white">
                            <span class="material-symbols-outlined text-3xl">share</span>
                        </div>
                        <span class="text-white text-xs font-bold drop-shadow-md">
                            {{ reel.shares }}
                        </span>
                    </button>

                </div>

                <!-- Bottom Info -->
                <div class="absolute inset-x-0 bottom-0 p-6 bg-gradient-to-t from-black/80 to-transparent">

                    <h3 class="text-white font-bold text-lg mb-1">
                        @{{ reel.creator }}
                    </h3>

                    <p class="text-white/90 text-sm mb-3">
                        {{ reel.summary }}
                    </p>

                    <div class="flex flex-wrap gap-2">
                        {% for tag in reel.hashtags %}
                        <span class="px-2 py-1 bg-white/10 rounded-lg text-white/80 text-[11px]">
                            #{{ tag }}
                        </span>
                        {% endfor %}
                    </div>

                </div>

            </div>

            {% endfor %}

        </div>


        <!-- Bottom Navigation Bar (iOS Style) -->
        <nav
            class="glass-nav border-t border-slate-200 dark:border-slate-800 safe-area-bottom px-6 py-3 flex justify-between items-center z-30">
            <a class="flex flex-col items-center gap-1 text-primary" href="#">
                <span class="material-symbols-outlined text-[28px] font-variation-fill">home</span>
                <span class="text-[10px] font-bold">Home</span>
            </a>
            <a class="flex flex-col items-center gap-1 text-slate-400" href="#">
                <span class="material-symbols-outlined text-[28px]">explore</span>
                <span class="text-[10px] font-medium">Explore</span>
            </a>
            <div class="relative -top-4">
                <button
                    class="bg-primary text-white size-14 rounded-2xl flex items-center justify-center shadow-lg shadow-primary/30 active:scale-95 transition-transform">
                    <span class="material-symbols-outlined text-3xl">add</span>
                </button>
            </div>
            <a class="flex flex-col items-center gap-1 text-slate-400" href="#">
                <span class="material-symbols-outlined text-[28px]">notifications</span>
                <span class="text-[10px] font-medium">Inbox</span>
            </a>
            <a class="flex flex-col items-center gap-1 text-slate-400" href="#">
                <span class="material-symbols-outlined text-[28px]">person</span>
                <span class="text-[10px] font-medium">Profile</span>
            </a>
        </nav>
        <!-- Dynamic Island/Notch Spacer for iPhone 14/15 Pro style -->
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-32 h-8 bg-black rounded-b-3xl z-50"></div>
    </div>
</body>

</html>
