<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ReelRoots 3D Archive</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; }

        #uiModal {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 20px;
            border-radius: 12px;
            width: 300px;
            display: none;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        #closeBtn {
            background: #1e3a8a;
            color: white;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            display:inline-block;
            margin-top:10px;
        }

        #hint {
            position:absolute;
            bottom:20px;
            left:50%;
            transform:translateX(-50%);
            color:white;
            background:rgba(0,0,0,0.6);
            padding:10px 20px;
            border-radius:20px;
        }
    </style>
</head>
<body>

<div id="uiModal">
    <h3 id="modalTitle">Archive</h3>
    <p id="modalContent">Content</p>
    <div id="closeBtn">Close</div>
</div>

<div id="hint">Click shelves, pod, or screen to explore</div>

<!-- ✅ THREE.JS (non-module version) -->
<script src="https://cdn.jsdelivr.net/npm/three@0.160/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160/examples/js/controls/OrbitControls.js"></script>

<script>
let scene, camera, renderer, controls;
let raycaster = new THREE.Raycaster();
let mouse = new THREE.Vector2();
let interactiveObjects = [];
let hovered = null;

init();
animate();

function init() {

    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1e293b);

    camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.set(0,5,15);

    renderer = new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // Lighting
    const ambient = new THREE.AmbientLight(0xffeedd, 0.6);
    scene.add(ambient);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1);
    dirLight.position.set(5,10,5);
    scene.add(dirLight);

    createEnvironment();

    window.addEventListener('resize', onResize);
    window.addEventListener('mousemove', onMouseMove);
    window.addEventListener('click', onClick);

    document.getElementById("closeBtn").onclick = function() {
        document.getElementById("uiModal").style.display = "none";
    };
}

function createEnvironment() {

    // Floor
    const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(50,50),
        new THREE.MeshStandardMaterial({color:0x6b4f3a})
    );
    floor.rotation.x = -Math.PI/2;
    scene.add(floor);

    // Bookshelves
    for(let i=-6; i<=6; i+=6){
        const shelf = new THREE.Mesh(
            new THREE.BoxGeometry(4,4,1),
            new THREE.MeshStandardMaterial({color:0x8b5e3c})
        );
        shelf.position.set(i,2,-5);
        shelf.userData = {
            title:"Independence Archives",
            content:"Explore historical documents from 1963 and related events."
        };
        scene.add(shelf);
        interactiveObjects.push(shelf);
    }

    // Oral History Pod
    const pod = new THREE.Mesh(
        new THREE.CylinderGeometry(1.5,1.5,3,32),
        new THREE.MeshStandardMaterial({color:0x3b82f6})
    );
    pod.position.set(-8,1.5,4);
    pod.userData = {
        title:"Oral History Station",
        content:"Listen to recorded community memories and stories."
    };
    scene.add(pod);
    interactiveObjects.push(pod);

    // Reel Screen
    const screen = new THREE.Mesh(
        new THREE.PlaneGeometry(4,7),
        new THREE.MeshStandardMaterial({color:0xfacc15})
    );
    screen.position.set(8,3,0);
    screen.rotation.y = -Math.PI/4;
    screen.userData = {
        title:"Archive Reel",
        content:"Watch AI-generated 30-second archive summaries."
    };
    scene.add(screen);
    interactiveObjects.push(screen);
}

function onMouseMove(event){
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = - (event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(interactiveObjects);

    if(intersects.length > 0){
        if(hovered !== intersects[0].object){
            if(hovered) hovered.material.emissive.set(0x000000);
            hovered = intersects[0].object;
            hovered.material.emissive = new THREE.Color(0x333333);
        }
    } else {
        if(hovered) hovered.material.emissive.set(0x000000);
        hovered = null;
    }
}

function onClick(){
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(interactiveObjects);

    if(intersects.length > 0){
        const obj = intersects[0].object;
        showModal(obj.userData.title, obj.userData.content);
        camera.position.set(obj.position.x, obj.position.y + 2, obj.position.z + 6);
    }
}

function showModal(title, content){
    document.getElementById("modalTitle").innerText = title;
    document.getElementById("modalContent").innerText = content;
    document.getElementById("uiModal").style.display = "block";
}

function onResize(){
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

function animate(){
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}
</script>

</body>
</html>
