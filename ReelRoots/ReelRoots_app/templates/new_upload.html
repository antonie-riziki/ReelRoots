<!DOCTYPE html>

<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>ReelRoots | Upload &amp; Metadata Editor</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1F5E4A",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101022",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
    <!-- Top Navigation Bar -->
    <header
        class="sticky top-0 z-50 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-primary/10 px-4 py-3 flex items-center justify-between">
        <button class="p-2 hover:bg-primary/10 rounded-full transition-colors">
            <span class="material-symbols-outlined text-slate-900 dark:text-slate-100">arrow_back_ios_new</span>
        </button>
        <h1 class="text-lg font-bold tracking-tight">Upload Archive</h1>
        <button class="p-2 hover:bg-primary/10 rounded-full transition-colors">
            <span class="material-symbols-outlined text-primary">info</span>
        </button>
    </header>

    <!-- Main Content Area -->
    <main class="flex-1 overflow-y-auto px-4 py-4 space-y-6">
        <form id="addArchiveForm" class="space-y-6">
            <!-- Upload Section -->
            <section class="space-y-3">
                <h2 class="text-xl font-bold px-1">Add Metadata</h2>

                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1 ml-1">Media Evidence
                        *</label>
                    <input type="file" id="media" name="media" accept="image/*,video/*,application/pdf" required
                        class="w-full bg-white dark:bg-slate-900 border border-primary/10 rounded-xl px-4 py-3 shadow-sm focus:ring-2 focus:ring-primary/50 text-sm file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-primary file:text-white hover:file:bg-primary/90">
                </div>
            </section>

            <!-- Metadata Form -->
            <section class="space-y-5">
                <div class="space-y-1.5">
                    <label class="text-sm font-bold text-slate-700 dark:text-slate-300 ml-1">Archive Title *</label>
                    <input id="title" required
                        class="w-full bg-white dark:bg-slate-900 border border-primary/10 rounded-xl px-4 py-3.5 focus:outline-none focus:ring-2 focus:ring-primary/50 text-slate-900 dark:text-slate-100 transition-all shadow-sm"
                        placeholder="e.g., Grandma's 1954 Migration Journal" type="text" />
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1.5">
                        <label class="text-sm font-bold text-slate-700 dark:text-slate-300 ml-1">Estimated Date
                            *</label>
                        <input type="date" id="event_date" required
                            class="w-full bg-white dark:bg-slate-900 border border-primary/10 rounded-xl px-4 py-3.5 focus:outline-none focus:ring-2 focus:ring-primary/50 text-slate-900 dark:text-slate-100 transition-all shadow-sm" />
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-sm font-bold text-slate-700 dark:text-slate-300 ml-1">Category *</label>
                        <div class="relative">
                            <select id="category" required
                                class="w-full bg-white dark:bg-slate-900 border border-primary/10 rounded-xl px-4 py-3.5 focus:outline-none focus:ring-2 focus:ring-primary/50 text-slate-900 dark:text-slate-100 transition-all shadow-sm appearance-none">
                                <option value="" disabled selected>Select Category</option>
                                <option value="Culture">Culture</option>
                                <option value="Politics">Politics</option>
                                <option value="Environment">Environment</option>
                                <option value="Oral History">Oral History</option>
                                <option value="Arts">Arts</option>
                                <option value="Conflict">Conflict</option>
                            </select>
                            <span
                                class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl pointer-events-none">expand_more</span>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1.5">
                        <label class="text-sm font-bold text-slate-700 dark:text-slate-300 ml-1">Country *</label>
                        <div class="relative">
                            <select id="country" required
                                class="w-full bg-white dark:bg-slate-900 border border-primary/10 rounded-xl px-4 py-3.5 focus:outline-none focus:ring-2 focus:ring-primary/50 text-slate-900 dark:text-slate-100 transition-all shadow-sm appearance-none">
                                <option value="" disabled selected>Select Country</option>
                                <option value="Kenya">Kenya</option>
                                <option value="Uganda">Uganda</option>
                                <option value="Tanzania">Tanzania</option>
                                <option value="Rwanda">Rwanda</option>
                                <option value="Burundi">Burundi</option>
                            </select>
                            <span
                                class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl pointer-events-none">expand_more</span>
                        </div>
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-sm font-bold text-slate-700 dark:text-slate-300 ml-1">Region *</label>
                        <input id="region" required
                            class="w-full bg-white dark:bg-slate-900 border border-primary/10 rounded-xl px-4 py-3.5 focus:outline-none focus:ring-2 focus:ring-primary/50 text-slate-900 dark:text-slate-100 transition-all shadow-sm"
                            placeholder="e.g., Nairobi" type="text" />
                    </div>
                </div>

                <div class="space-y-1.5">
                    <label class="text-sm font-bold text-slate-700 dark:text-slate-300 ml-1">Summary *</label>
                    <textarea id="summary" required
                        class="w-full bg-white dark:bg-slate-900 border border-primary/10 rounded-xl px-4 py-3.5 focus:outline-none focus:ring-2 focus:ring-primary/50 text-slate-900 dark:text-slate-100 transition-all shadow-sm resize-none"
                        placeholder="Short summary of the archive..." rows="2"></textarea>
                </div>

                <div class="space-y-1.5">
                    <div class="flex items-center justify-between px-1">
                        <label class="text-sm font-bold text-slate-700 dark:text-slate-300">Story Behind the Document
                            *</label>
                        <button type="button"
                            class="flex items-center gap-1 text-primary text-xs font-bold bg-primary/10 px-2 py-1 rounded-full">
                            <span class="material-symbols-outlined text-xs">auto_fix_high</span>
                            AI Assist
                        </button>
                    </div>
                    <textarea id="full_story" required
                        class="w-full bg-white dark:bg-slate-900 border border-primary/10 rounded-xl px-4 py-3.5 focus:outline-none focus:ring-2 focus:ring-primary/50 text-slate-900 dark:text-slate-100 transition-all shadow-sm resize-none"
                        placeholder="Describe the cultural significance or personal memory..." rows="4"></textarea>
                </div>
            </section>

            <!-- Tag Suggestions -->
            <section class="space-y-3">
                <label class="text-sm font-bold text-slate-700 dark:text-slate-300 ml-1">Tags (Hold Ctrl/Cmd to select
                    multiple) *</label>
                <select id="tags" name="tags" multiple required
                    class="w-full bg-white dark:bg-slate-900 border border-primary/10 rounded-xl px-4 py-3.5 focus:outline-none focus:ring-2 focus:ring-primary/50 text-slate-900 dark:text-slate-100 h-24 shadow-sm">
                    <option value="Colonial Era">Colonial Era</option>
                    <option value="Independence">Independence</option>
                    <option value="Artifact">Artifact</option>
                    <option value="Politics">Politics</option>
                    <option value="Art">Art</option>
                    <option value="Folklore">Folklore</option>
                </select>
            </section>
        </form>
        <div class="h-20"></div> <!-- Spacer for fixed footer -->
    </main>

    <!-- Bottom Navigation Bar / Action Bar -->
    <div
        class="fixed bottom-[4.5rem] md:bottom-0 left-0 right-0 bg-white/90 dark:bg-slate-900/90 backdrop-blur-xl border-t border-slate-200 dark:border-slate-800 px-4 py-4 z-50">
        <div class="flex items-center gap-4 max-w-md mx-auto">
            <button type="button" onclick="window.history.back()"
                class="flex-1 bg-slate-100 dark:bg-slate-800 text-slate-900 dark:text-slate-100 py-4 rounded-xl font-bold transition-transform active:scale-95">
                Cancel
            </button>
            <button id="uploadBtn" type="button" onclick="submitArchive()"
                class="flex-[2] bg-primary text-white py-4 rounded-xl font-bold shadow-xl shadow-primary/30 transition-transform active:scale-95 flex items-center justify-center gap-2">
                Upload Record
                <span class="material-symbols-outlined">cloud_upload</span>
            </button>
        </div>
    </div>

    <!-- iOS style Home Indicator -->
    <div class="fixed bottom-1 left-1/2 -translate-x-1/2 w-32 h-1 bg-slate-300 dark:bg-slate-700 rounded-full z-[60]">
    </div>

    {% include 'navbar.html' %}

    <script>
        async function submitArchive() {
            const form = document.getElementById('addArchiveForm');
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            const submitBtn = document.getElementById('uploadBtn');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = 'Uploading... <span class="material-symbols-outlined">sync</span>';
            submitBtn.disabled = true;

            const formData = new FormData();
            formData.append('title', document.getElementById('title').value);
            formData.append('event_date', document.getElementById('event_date').value);
            formData.append('category', document.getElementById('category').value);
            formData.append('country', document.getElementById('country').value);
            formData.append('region', document.getElementById('region').value);
            formData.append('summary', document.getElementById('summary').value);
            formData.append('full_story', document.getElementById('full_story').value);

            const mediaFile = document.getElementById('media').files[0];
            if (mediaFile) {
                formData.append('media', mediaFile);
            }

            const tagsSelect = document.getElementById('tags');
            const selectedTags = Array.from(tagsSelect.selectedOptions).map(opt => opt.value);
            formData.append('tags', JSON.stringify(selectedTags));

            try {
                const response = await fetch('/api/archives/create/', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    alert('Archive uploaded successfully!');
                    window.location.href = '/explore/';
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (err) {
                console.error(err);
                alert('A network error occurred.');
            } finally {
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        }
    </script>
</body>

</html>
