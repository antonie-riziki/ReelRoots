<!DOCTYPE html>

<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>ReelRoots | Upload &amp; Metadata Editor</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1111d4",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101022",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
    <!-- Top Navigation Bar -->
    <header
        class="sticky top-0 z-50 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-primary/10 px-4 py-3 flex items-center justify-between">
        <button class="p-2 hover:bg-primary/10 rounded-full transition-colors">
            <span class="material-symbols-outlined text-slate-900 dark:text-slate-100">arrow_back_ios_new</span>
        </button>
        <h1 class="text-lg font-bold tracking-tight">Upload Archive</h1>
        <button class="p-2 hover:bg-primary/10 rounded-full transition-colors">
            <span class="material-symbols-outlined text-primary">info</span>
        </button>
    </header>
    <!-- Progress Indicator -->
    <div class="px-6 pt-6 pb-2">
        <div class="flex items-center justify-between relative mb-2">
            <div class="absolute top-1/2 left-0 w-full h-0.5 bg-primary/10 -translate-y-1/2 z-0"></div>
            <div
                class="absolute top-1/2 left-0 w-1/3 h-0.5 bg-primary -translate-y-1/2 z-0 transition-all duration-500">
            </div>
            <!-- Step 1 (Active) -->
            <div class="relative z-10 flex flex-col items-center">
                <div
                    class="w-8 h-8 rounded-full bg-primary text-white flex items-center justify-center text-sm font-bold shadow-lg shadow-primary/20">
                    1
                </div>
                <span class="text-[10px] font-bold mt-1 uppercase tracking-wider text-primary">Media</span>
            </div>
            <!-- Step 2 (Upcoming) -->
            <div class="relative z-10 flex flex-col items-center">
                <div
                    class="w-8 h-8 rounded-full bg-background-light dark:bg-slate-800 border-2 border-primary/20 text-slate-400 flex items-center justify-center text-sm font-bold">
                    2
                </div>
                <span class="text-[10px] font-bold mt-1 uppercase tracking-wider text-slate-400">Context</span>
            </div>
            <!-- Step 3 (Upcoming) -->
            <div class="relative z-10 flex flex-col items-center">
                <div
                    class="w-8 h-8 rounded-full bg-background-light dark:bg-slate-800 border-2 border-primary/20 text-slate-400 flex items-center justify-center text-sm font-bold">
                    3
                </div>
                <span class="text-[10px] font-bold mt-1 uppercase tracking-wider text-slate-400">Tags</span>
            </div>
            <!-- Step 4 (Upcoming) -->
            <div class="relative z-10 flex flex-col items-center">
                <div
                    class="w-8 h-8 rounded-full bg-background-light dark:bg-slate-800 border-2 border-primary/20 text-slate-400 flex items-center justify-center text-sm font-bold">
                    4
                </div>
                <span class="text-[10px] font-bold mt-1 uppercase tracking-wider text-slate-400">Review</span>
            </div>
        </div>
    </div>
    <!-- Main Content Area -->
    <main class="flex-1 overflow-y-auto px-4 py-4 space-y-6">
        <!-- Upload Section -->
        <section class="space-y-3">
            <h2 class="text-xl font-bold px-1">Add Metadata</h2>
            <div class="relative group">
                <div
                    class="flex flex-col items-center justify-center gap-4 rounded-xl border-2 border-dashed border-primary/30 bg-primary/5 px-6 py-12 transition-all hover:border-primary/50 hover:bg-primary/10">
                    <div class="w-16 h-16 rounded-full bg-primary/20 flex items-center justify-center">
                        <span class="material-symbols-outlined text-primary text-3xl">cloud_upload</span>
                    </div>
                    <div class="text-center">
                        <p class="text-slate-900 dark:text-slate-100 text-lg font-bold">Upload Document</p>
                        <p class="text-slate-500 dark:text-slate-400 text-sm mt-1">Tap to select photos, PDFs, or scans
                        </p>
                    </div>
                    <button
                        class="bg-primary text-white px-6 py-2.5 rounded-lg font-bold text-sm shadow-lg shadow-primary/20 active:scale-95 transition-transform">
                        Select Files
                    </button>
                </div>
            </div>
        </section>
        <!-- Metadata Form -->
        <section class="space-y-5">
            <div class="space-y-1.5">
                <label class="text-sm font-bold text-slate-700 dark:text-slate-300 ml-1">Archive Title</label>
                <input
                    class="w-full bg-white dark:bg-slate-900 border border-primary/10 rounded-xl px-4 py-3.5 focus:outline-none focus:ring-2 focus:ring-primary/50 text-slate-900 dark:text-slate-100 transition-all shadow-sm"
                    placeholder="e.g., Grandma's 1954 Migration Journal" type="text" />
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-1.5">
                    <label class="text-sm font-bold text-slate-700 dark:text-slate-300 ml-1">Estimated Date</label>
                    <div class="relative">
                        <input
                            class="w-full bg-white dark:bg-slate-900 border border-primary/10 rounded-xl px-4 py-3.5 focus:outline-none focus:ring-2 focus:ring-primary/50 text-slate-900 dark:text-slate-100 transition-all shadow-sm"
                            placeholder="MM / DD / YYYY" type="text" />
                        <span
                            class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">calendar_today</span>
                    </div>
                </div>
                <div class="space-y-1.5">
                    <label class="text-sm font-bold text-slate-700 dark:text-slate-300 ml-1">Community</label>
                    <div class="relative">
                        <select
                            class="w-full bg-white dark:bg-slate-900 border border-primary/10 rounded-xl px-4 py-3.5 focus:outline-none focus:ring-2 focus:ring-primary/50 text-slate-900 dark:text-slate-100 transition-all shadow-sm appearance-none">
                            <option>Heritage Root</option>
                            <option>City Archives</option>
                            <option>Youth Collective</option>
                        </select>
                        <span
                            class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl pointer-events-none">expand_more</span>
                    </div>
                </div>
            </div>
            <div class="space-y-1.5">
                <div class="flex items-center justify-between px-1">
                    <label class="text-sm font-bold text-slate-700 dark:text-slate-300">Story Behind the
                        Document</label>
                    <button
                        class="flex items-center gap-1 text-primary text-xs font-bold bg-primary/10 px-2 py-1 rounded-full">
                        <span class="material-symbols-outlined text-xs">auto_fix_high</span>
                        AI Assist
                    </button>
                </div>
                <textarea
                    class="w-full bg-white dark:bg-slate-900 border border-primary/10 rounded-xl px-4 py-3.5 focus:outline-none focus:ring-2 focus:ring-primary/50 text-slate-900 dark:text-slate-100 transition-all shadow-sm resize-none"
                    placeholder="Describe the cultural significance or personal memory..." rows="4"></textarea>
            </div>
        </section>
        <!-- Tag Suggestions -->
        <section class="space-y-3">
            <label class="text-sm font-bold text-slate-700 dark:text-slate-300 ml-1">Quick Tags</label>
            <div class="flex flex-wrap gap-2">
                <span class="bg-primary text-white px-3 py-1.5 rounded-full text-xs font-bold flex items-center gap-1">
                    #Migration <span class="material-symbols-outlined text-[14px]">close</span>
                </span>
                <span
                    class="bg-primary/10 text-primary border border-primary/20 px-3 py-1.5 rounded-full text-xs font-bold">#FamilyPhoto</span>
                <span
                    class="bg-primary/10 text-primary border border-primary/20 px-3 py-1.5 rounded-full text-xs font-bold">#CulturalHeritage</span>
                <span
                    class="bg-primary/10 text-primary border border-primary/20 px-3 py-1.5 rounded-full text-xs font-bold">#1950s</span>
                <button
                    class="bg-slate-200 dark:bg-slate-800 text-slate-600 dark:text-slate-400 px-3 py-1.5 rounded-full text-xs font-bold flex items-center gap-1">
                    <span class="material-symbols-outlined text-[14px]">add</span> Add Tag
                </button>
            </div>
        </section>
        <div class="h-20"></div> <!-- Spacer for fixed footer -->
    </main>
    <!-- Bottom Navigation Bar / Action Bar -->
    <div
        class="fixed bottom-0 left-0 right-0 bg-white/90 dark:bg-slate-900/90 backdrop-blur-xl border-t border-slate-200 dark:border-slate-800 px-4 pt-3 pb-8">
        <div class="flex items-center gap-4 max-w-md mx-auto">
            <button
                class="flex-1 bg-slate-100 dark:bg-slate-800 text-slate-900 dark:text-slate-100 py-4 rounded-xl font-bold transition-transform active:scale-95">
                Save Draft
            </button>
            <button
                class="flex-[2] bg-primary text-white py-4 rounded-xl font-bold shadow-xl shadow-primary/30 transition-transform active:scale-95 flex items-center justify-center gap-2">
                Continue
                <span class="material-symbols-outlined">arrow_forward</span>
            </button>
        </div>
    </div>
    <!-- iOS style Home Indicator -->
    <div class="fixed bottom-1 left-1/2 -translate-x-1/2 w-32 h-1 bg-slate-300 dark:bg-slate-700 rounded-full z-[60]">
    </div>
    <!-- Bottom Nav Placeholder (to match component style if needed for global context) -->
