{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Verify your phone · ReelRoots</title>
    <link rel="stylesheet" href="{% static 'css/reelroots.css' %}">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-[#f5f7f4] text-[#10231c]">
    <main class="mx-auto flex min-h-screen max-w-md items-center px-5 py-10">
        <section class="w-full rounded-3xl border border-[#dce5df] bg-white p-7 shadow-xl">
            <p class="text-xs font-extrabold uppercase tracking-[.18em] text-[#176447]">Step 1 of 2</p>
            <h1 class="mt-3 text-3xl font-extrabold tracking-tight">Verify your phone</h1>
            <p class="mt-3 text-sm leading-6 text-slate-600">We sent a six-digit code to {{ phone_number }}. It expires in ten minutes.</p>
            {% if messages %}
                <div class="mt-5 space-y-2">{% for message in messages %}<p class="rounded-xl bg-amber-50 px-4 py-3 text-sm text-amber-900">{{ message }}</p>{% endfor %}</div>
            {% endif %}
            <form method="post" class="mt-7 space-y-4">
                {% csrf_token %}
                <label for="code" class="block text-sm font-bold">Verification code</label>
                <input id="code" name="code" inputmode="numeric" autocomplete="one-time-code" pattern="[0-9]{6}" maxlength="6" required class="w-full rounded-2xl border border-[#dce5df] px-4 py-4 text-center text-2xl tracking-[.45em] focus:border-[#176447] focus:outline-none" placeholder="000000">
                <button class="w-full rounded-2xl bg-[#176447] px-4 py-4 font-bold text-white">Verify phone</button>
            </form>
            <form method="post" action="{% url 'resend-phone-code' %}" class="mt-4 text-center">
                {% csrf_token %}
                <button class="text-sm font-bold text-[#176447]">Send a new code</button>
            </form>
        </section>
    </main>
</body>
</html>
