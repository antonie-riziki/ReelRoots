<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset password | ReelRoots</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900 flex items-center justify-center px-4">
    <main class="w-full max-w-md rounded-3xl bg-white p-8 shadow-xl">
        <a href="/" class="text-xl font-bold text-emerald-800">Reel<span class="text-amber-600">Roots</span></a>
        <h1 class="mt-8 text-2xl font-bold">Choose a new password</h1>
        <p id="status" class="mt-2 text-sm text-slate-600">Checking your secure reset link…</p>
        <form id="reset-form" class="mt-6 hidden space-y-4">
            <label class="block text-sm font-medium">New password
                <input id="password" type="password" minlength="8" required class="mt-2 w-full rounded-xl border px-4 py-3">
            </label>
            <label class="block text-sm font-medium">Confirm password
                <input id="confirm-password" type="password" minlength="8" required class="mt-2 w-full rounded-xl border px-4 py-3">
            </label>
            <button class="w-full rounded-xl bg-emerald-800 px-4 py-3 font-semibold text-white" type="submit">Update password</button>
        </form>
        <a id="signin-link" href="{% url 'auth' %}" class="mt-6 hidden text-sm font-semibold text-emerald-800">Return to sign in</a>
    </main>
    <script>
        const status = document.getElementById('status');
        const form = document.getElementById('reset-form');
        const signinLink = document.getElementById('signin-link');
        const client = window.supabase.createClient(
            '{{ supabase_url|escapejs }}',
            '{{ supabase_publishable_key|escapejs }}'
        );

        async function loadResetSession() {
            const { data, error } = await client.auth.getSession();
            if (error || !data.session) {
                status.textContent = 'This reset link is invalid or has expired. Request a new one.';
                signinLink.classList.remove('hidden');
                return;
            }
            status.textContent = 'Enter a new password for your account.';
            form.classList.remove('hidden');
        }

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            const password = document.getElementById('password').value;
            const confirmation = document.getElementById('confirm-password').value;
            if (password !== confirmation) {
                status.textContent = 'The passwords do not match.';
                return;
            }
            const { error } = await client.auth.updateUser({ password });
            if (error) {
                status.textContent = error.message;
                return;
            }
            status.textContent = 'Password updated. You can now sign in.';
            form.classList.add('hidden');
            signinLink.classList.remove('hidden');
        });

        loadResetSession();
    </script>
</body>
</html>
