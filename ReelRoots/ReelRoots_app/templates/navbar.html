{% load static %}
<!-- Desktop navigation keeps the full app usable beyond phone-sized screens. -->
<style>
    @media (min-width: 1024px) {
        body:has(> nav) { padding-top: 57px; }
    }
</style>
<nav class="fixed inset-x-0 top-0 z-50 hidden border-b border-slate-200 bg-white/95 px-8 py-3 backdrop-blur-md dark:border-slate-800 dark:bg-slate-950/95 lg:block">
    <div class="mx-auto flex max-w-6xl items-center justify-between">
        <a class="flex items-center gap-2" href="/home">
            <img src="{% static 'img/archives/media/logo1.png' %}" alt="ReelRoots" class="h-9 w-auto object-contain" />
        </a>
        <div class="flex items-center gap-7 text-sm font-semibold text-slate-600 dark:text-slate-300">
            <a class="hover:text-primary" href="/home">Home</a>
            <a class="hover:text-primary" href="/explore">Discover</a>
            <a class="hover:text-primary" href="/reels">Reels</a>
            <a class="hover:text-primary" href="/upload">Upload</a>
            <a class="hover:text-primary" href="/user-profile">Profile</a>
        </div>
    </div>
</nav>

<!-- Bottom Navigation Bar -->
<nav
    class="fixed bottom-0 left-0 right-0 z-50 bg-white/95 px-6 py-2 pb-6 backdrop-blur-md border-t border-slate-200 dark:border-slate-800 dark:bg-slate-950/95 lg:hidden">
    <div class="flex items-center justify-between max-w-md mx-auto">
        <a class="flex flex-col items-center gap-1 text-primary" href="/home">
            <img src="{% static 'img/archives/media/logo1.png' %}" alt="ReelRoots home" class="h-7 w-7 rounded-md object-contain" />
            <span class="text-[10px] font-bold">Home</span>
        </a>
        <a class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500" href="/explore">
            <span class="material-symbols-outlined">explore</span>
            <span class="text-[10px] font-medium">Discover</span>
        </a>
        <a class="flex flex-col items-center gap-1" href="/upload">
            <div
                class="w-12 h-10 bg-primary rounded-xl flex items-center justify-center -mt-6 shadow-lg shadow-primary/30 text-white">
                <span class="material-symbols-outlined">add</span>
            </div>
            <span class="text-[10px] font-medium text-slate-400 dark:text-slate-500 mt-1">Upload</span>
        </a>
        <a class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500" href="/reels">
            <span class="material-symbols-outlined">videocam</span>
            <span class="text-[10px] font-medium">Reels</span>
        </a>
        <a class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500" href="/user-profile">
            <span class="material-symbols-outlined">account_circle</span>
            <span class="text-[10px] font-medium">Profile</span>
        </a>
    </div>
</nav>
